services:

  # ── Base de dados ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: router-db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5431:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d   # corre as migrações no primeiro arranque
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - factor_router_net

  # ── Gateway API ────────────────────────────────────────────────────────────
  router-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: router-api:0.0.1
    container_name: router-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - factor_router_net

# ── Volumes ────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    name: router-db-data

# ── Network ───────────────────────────────────────────────────────────────
networks:
  factor_router_net:
    name: factor_router_net
    driver: bridge