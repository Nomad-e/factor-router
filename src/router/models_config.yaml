# =============================================================================
# FACTOR AI ERP AGENT — MODEL ROUTING CONFIGURATION
# =============================================================================
#
# This file is read by the classifier (Qwen3-0.6B local) to decide which
# LLM model to use for each user request to the Factor AI ERP Agent.
#
# The classifier receives the user message + this file and returns
# the most suitable model in JSON format: {"model": "provider/model-id"}
#
# TASK TYPES (match first, then pick cheapest model for that type):
#   simple    → explicação, conceitos, página atual. ZERO tool calls. Resposta do page_context ou conversa.
#   long      → traduzir, extrair, formatar, transcrever. Dados no texto/página, sem search_read no ERP.
#   reasoning → listar, contar, criar, atualizar simples. 1-3 tool calls, modelo único, campos diretos.
#   reasoning+→ comparar, agregar, multi-step, Many2one simples. 2-5 tool calls no ERP.
#   complex   → workflows, Many2one complexo, agentic longo, self-correction. 3-10 tool calls. LAST RESORT.
#
# ESCALATION LADDER (cheapest output → most capable):
#   gpt-5.4-nano ($1.25) → kimi-k2.5 ($2.20) → gpt-5.4-mini ($4.50)
#   → gpt-oss-120b:exacto ($2.34) → qwen3.5-397b ($2.34) → glm-5 ($2.56)
#
# PRINCIPLE: Bom, Bonito e Barato — use the CHEAPEST model that does the job correctly.
#   - Gemini 3.1 Flash Lite: default for all simple/context/RAG tasks — 1M context.
#   - DeepSeek V3.2: cheapest output ($0.40) — squeeze for all text processing.
#   - gpt-oss-120b:exacto: deterministic tool calling — no confabulation on ERP args.
#   - Qwen3.5-397b: multi-step reasoning — 262K context, strong generalization.
#   - GLM-5: agentic long-horizon workflows — self-correction, complex orchestration. LAST RESORT.
#
# AGENT CONTEXT:
#   The Factor AI ERP Agent is a dynamic agent operating on top of Factor AI ERP.
#   The agent has access to:
#     - ERP API tools: list_available_models, inspect_model_fields, execute_erp_command
#     - Current page context (ERP interface DOM injected into the system prompt)
#     - Conversation history (Redis + PostgreSQL)
#     - User biographical memory (ChromaDB)
#     - User permissions and groups (Redis cache)
#     - Installed modules on the Factor AI ERP instance
#   The agent can execute up to 15 chained tool calls per request.
# =============================================================================

models:

  # ---------------------------------------------------------------------------
  # TASK: simple — explicação, conceitos, página atual. ZERO tool calls.
  # DEFAULT MODEL — handles 70%+ of all requests.
  # ---------------------------------------------------------------------------
  - id: "openai/gpt-5.1-codex-mini"
    tier: "light"
    task_type: "simple"
    context_window: 400000
    pricing:
      input_per_1m_tokens: "$0.25"
      output_per_1m_tokens: "$2.00"
    description: >
      Default model. For all requests that need ZERO data fetch from the ERP.
      Answer comes entirely from page_context (DOM injected into system prompt)
      or conversation history. Supports thinking levels (minimal→high) for
      cost/performance trade-offs. 1M context handles the largest ERP page_context
      injections. Best-in-class for RAG snippet ranking, translation, data extraction,
      audio/ASR, and code completion — all without ERP tool calls.
      If the user asks to list, count, update, create, compare, or fetch ANYTHING
      from the ERP database — that is NOT simple. Use reasoning tier or higher.
    best_for:
      - >
        User asks to explain or describe what is on the CURRENT page —
        page_context has the info, no tool call needed —
        examples: 'explica esta página', 'what is on this screen?',
        'what does this error mean?', 'o que estou a ver?', 'o que significa este campo?'
      - >
        Pure conceptual question with NO data fetch —
        examples: 'what is an accounting journal?',
        'what is the difference between a quotation and a sale order?',
        'how does the CRM module work?', 'o que é um diário contabilístico?'
      - >
        Casual conversation —
        examples: 'what can you help with?', 'olá', 'obrigado', 'bom dia',
        'help me understand where to start'
      - >
        Listing installed modules (single lightweight call) —
        examples: 'what modules do I have installed?', 'que módulos tenho?'
      - >
        RAG snippet ranking — selecting the most relevant chunk from pre-fetched
        ERP documentation or knowledge base snippets injected into context
      - >
        Audio/voice input transcription and ASR post-processing when the agent
        receives voice input — 'transcribe and clean up this voice note'
    not_for: >
      'lista X', 'quantos Y', 'resume os tickets', 'compare X com Y', 'actualiza-me',
      any request implying fetching, counting, creating, or updating ERP data —
      use reasoning or higher.


  # ---------------------------------------------------------------------------
  # TASK: reasoning+ — comparar, agregar, multi-step, Many2one simples. 2-5 tool calls.
  # GPT-5.4 nano: mais barato e rápido (Mar 2026). Classifier escolhe o mais adequado.
  # ---------------------------------------------------------------------------
  - id: "openai/gpt-5.4-nano"
    tier: "medium-high"
    task_type: "reasoning+"
    context_window: 400000
    pricing:
      input_per_1m_tokens: "$0.20"
      output_per_1m_tokens: "$1.25"
    description: >
      OpenAI GPT-5.4 nano — lightest and most cost-efficient in the GPT-5.4 family (Mar 2026).
      Optimized for speed and high-volume: classification, data extraction, ranking,
      and agentic tool use. 400K context. Strong on agentic (tau2-bench, SWE-Bench Pro)
      and STEM (GPQA). Use for multi-step ERP operations, aggregation, comparisons —
      2-5 tool calls. Cheaper and lower latency than Kimi; prefer for most reasoning+ tasks.
    best_for:
      - >
        Multi-step reasoning with 2-5 chained ERP tool calls —
        examples: 'compare sales this month vs last', 'list open tickets and summarize by priority'
      - >
        Aggregation and comparison — 'total revenue by product', 'how many invoices are overdue?'
      - >
        Many2one resolution — 'create a sale order for client ABC', 'assign this task to user X'
    not_for: >
      Simple single-call tasks; deep math/code reasoning (prefer Codex-mini or Kimi).

  # ---------------------------------------------------------------------------
  # TASK: reasoning+ (alternativa) — Kimi K2.5, reasoning profundo, thinking tokens.
  # ---------------------------------------------------------------------------
  - id: "anthropic/claude-sonnet-4.6"
    tier: "medium-high"
    task_type: "reasoning+"
    context_window: 262000
    pricing:
      input_per_1m_tokens: "$0.45"
      output_per_1m_tokens: "$2.20"
    description: >
      Moonshot AI native multimodal model with strong performance in general reasoning,
      visual coding, and agentic tool-calling. Self-directed agent paradigm.
      262K context, cheaper output than GLM-5 and Qwen. Use for multi-step ERP
      operations, aggregation, comparisons, and Many2one resolution — 2-5 tool calls.
      Escalate to GLM-5 for complex long-horizon workflows or self-correction needs.
    best_for:
      - >
        Multi-step reasoning with 2-5 chained ERP tool calls —
        examples: 'compare sales this month vs last', 'list open tickets and summarize by priority',
        'create a customer and add them to a mailing list'
      - >
        Aggregation and comparison tasks requiring search_read + analysis —
        examples: 'total revenue by product', 'how many invoices are overdue?',
        'top 5 customers by sales volume'
      - >
        Many2one resolution with 1-2 lookups before create/write —
        examples: 'create a sale order for client ABC', 'assign this task to user X'
    not_for: >
      Simple single-call tasks.

  # ---------------------------------------------------------------------------
  # TASK: reasoning+ (mais capaz) — GPT-5.4 mini, balance capability/efficiency (Mar 2026).
  # ---------------------------------------------------------------------------
  - id: "openai/gpt-5.4-mini"
    tier: "medium-high"
    task_type: "reasoning+"
    context_window: 400000
    pricing:
      input_per_1m_tokens: "$0.75"
      output_per_1m_tokens: "$4.50"
    description: >
      OpenAI GPT-5.4 mini — core GPT-5.4 capabilities in a faster, efficient model (Mar 2026).
      Strong performance across reasoning, coding, and tool use. 400K context.
      Balanced for production: chat, coding assistants, agent workflows at scale.
      Reliable instruction following, solid multi-step reasoning, consistent across tasks.
      Use when reasoning+ tasks need more capability than nano/Kimi — higher cost, better quality.
    best_for:
      - >
        Multi-step reasoning with 2-5 chained ERP tool calls where quality matters —
        complex comparisons, multi-model aggregation, nuanced Many2one resolution
      - >
        Agent workflows that benefit from stronger instruction following and reasoning —
        'compare and summarize sales by region and product', 'create order and link to project'
      - >
        Tasks that may need slightly deeper reasoning than nano/Kimi without going to complex tier
    not_for: >
      Simple single-call tasks; when nano or Kimi are sufficient (prefer cheaper first).


# =============================================================================
# PRICING SUMMARY (OpenRouter — March 2026)
# =============================================================================
#
#  Model                                  | Context | Input /1M  | Output /1M
#  ---------------------------------------|---------|------------|------------
#  openai/gpt-5.4-nano                    | 400K    | $0.20      | $1.25
#  moonshotai/kimi-k2.5                   | 262K    | $0.45      | $2.20
#  openai/gpt-5.4-mini                    | 400K    | $0.75      | $4.50
#
#  ESCALATION RULE: Cheapest first for reasoning+ → nano, then Kimi, then mini (more capable).
#
# =============================================================================

# =============================================================================
# FALLBACK MODEL
# Used when the classifier cannot determine the tier with sufficient confidence.
# openai/gpt-5.1-codex-mini — 1M context, handles any page_context safely, cheap default.
# =============================================================================
default_model: "openai/gpt-5.1-codex-mini"